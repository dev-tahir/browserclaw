<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      background: #0f0f14;
      color: #e4e4ef;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #2a2a3d;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #7c7eff; }
    .btn-ghost { background: transparent; color: #9898b0; border: 1px solid #2a2a3d; }
    .btn-ghost:hover { background: #1e1e2a; }
    .btn-sm { padding: 5px 10px; font-size: 11px; }
    .btn-full { width: 100%; justify-content: center; }

    .content { padding: 12px 16px; }

    .quick-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .quick-actions .btn { flex: 1; }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #6b6b82;
      margin-bottom: 8px;
    }

    .task-list { max-height: 300px; overflow-y: auto; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 4px;
    }
    .task-item:hover { background: #1e1e2a; }

    .task-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .task-dot.running { background: #6366f1; animation: pulse 1.5s infinite; }
    .task-dot.completed { background: #22c55e; }
    .task-dot.stopped { background: #f59e0b; }
    .task-dot.error { background: #ef4444; }
    .task-dot.pending { background: #3b82f6; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .task-info { flex: 1; min-width: 0; }
    .task-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .task-meta { font-size: 11px; color: #6b6b82; margin-top: 2px; }

    .task-status {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .task-status.running { background: rgba(99,102,241,0.15); color: #6366f1; }
    .task-status.completed { background: rgba(34,197,94,0.15); color: #22c55e; }
    .task-status.stopped { background: rgba(245,158,11,0.15); color: #f59e0b; }
    .task-status.error { background: rgba(239,68,68,0.15); color: #ef4444; }

    .empty {
      text-align: center;
      padding: 24px;
      color: #6b6b82;
    }
    .empty p { font-size: 12px; margin-top: 4px; }

    .footer {
      padding: 12px 16px;
      border-top: 1px solid #2a2a3d;
      text-align: center;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #2a2a3d; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 AI Browser Control</h1>
  </div>

  <div class="content">
    <div class="quick-actions">
      <button class="btn btn-primary" id="btnOpenDashboard">Open Dashboard</button>
      <button class="btn btn-ghost" id="btnNewTask">+ New Task</button>
    </div>

    <div class="section-title">Active Tasks</div>
    <div class="task-list" id="taskList">
      <div class="empty" id="emptyTasks">
        <div>📭</div>
        <p>No active tasks</p>
      </div>
    </div>
  </div>

  <div class="footer">
    <button class="btn btn-ghost btn-sm btn-full" id="btnSettings">⚙️ Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
